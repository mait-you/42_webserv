<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in · webserv</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="auth-wrap">
      <form class="auth-card" method="POST">
        <div class="brand" style="margin-bottom:18px">
          <span class="logo-dot"></span>
          <span class="brand-name">webserv<span class="muted">/cloud</span></span>
        </div>
        <h1>Welcome back</h1>
        <p class="sub">Sign in to manage your files.</p>

        <div class="field">
          <label for="user">Username</label>
          <input id="user" name="username" type="text" placeholder="admin" required />
        </div>
        <div class="field">
          <label for="pass">Password</label>
          <input id="pass" name="password" type="password" placeholder="••••••••" required />
        </div>

        <button class="btn btn-primary btn-block" type="submit">Sign in</button>
      </form>
    </div>
  </body>
</html>
