<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>WebServ — Dashboard</title>
	<link rel="icon" type="image/x-icon" href="/favicon.ico" />
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<link rel="stylesheet" href="/css/style.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<header>
	<a class="logo" href="/index.html">web<span>serv</span></a>
	<nav>
		<a href="/dashboard.html" class="active">Dashboard</a>
		<a href="/uploads" class="btn btn-ghost" style="padding:4px 12px;font-size:12px;">↗ /uploads</a>
		<button class="theme-btn" onclick="toggleTheme()">
			<span id="theme-icon">☀</span>
			<span id="theme-label">Light</span>
		</button>
	</nav>
</header>

<main>
<div class="dashboard">

	<!-- ── MAIN COLUMN ── -->
	<div class="main-col">

		<!-- Upload -->
		<div class="card">
			<div class="card-header">
				<span class="badge">POST</span>
				<h2>Upload — multipart/form-data</h2>
			</div>
			<div class="card-body">
				<form method="POST" action="/uploads" enctype="multipart/form-data"
				      style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
					<input type="file" name="file[]" multiple style="flex:1;min-width:160px;" />
					<button type="submit" class="btn btn-primary">↑ Upload</button>
				</form>
			</div>
		</div>

		<!-- Files -->
		<div class="card">
			<div class="card-header">
				<span class="badge ok">GET</span>
				<h2>Uploaded files</h2>
			</div>
			<div class="card-body" style="padding:0;">
				<div id="file-wrap">
					<div class="empty-state">
						<span class="empty-icon">📂</span>
						Loading…
					</div>
				</div>
				<div class="purge-row">
					<span class="purge-note">Delete every file in /uploads</span>
					<a href="/cgi-bin/purge_uploads.py" class="btn btn-danger"
					   style="font-size:12px;padding:5px 13px;">✕ Purge all</a>
				</div>
			</div>
		</div>

	</div>

	<!-- ── SIDEBAR ── -->
	<aside class="sidebar">

		<span class="sidebar-label">CGI scripts</span>
		<a class="cgi-link" href="/cgi-bin/session.py" target="_blank">
			session.py <span class="cgi-ext">.py</span>
		</a>
		<a class="cgi-link" href="/cgi-bin/form.pl" target="_blank">
			form.pl <span class="cgi-ext">.pl</span>
		</a>
		<a class="cgi-link" href="/cgi-bin/uploads.py" target="_blank">
			uploads.py <span class="cgi-ext">.py</span>
		</a>

		<span class="sidebar-label">Directories</span>
		<a class="cgi-link" href="/uploads" target="_blank">
			/uploads <span class="cgi-ext">dir</span>
		</a>
		<a class="cgi-link" href="/images" target="_blank">
			/images <span class="cgi-ext">dir</span>
		</a>

	</aside>

</div>
</main>

<script src="/js/cookies.js"></script>
<script>
function loadFiles() {
	fetch('/uploads')
		.then(r => r.text())
		.then(html => {
			var files = [];
			var re = /href=['"]([^'"]+)['"]/g;
			var m;
			while ((m = re.exec(html)) !== null) {
				var href = m[1];
				if (href === '../' || href === '/' || href.endsWith('/'))
					continue;
				var name = href.split('/').pop();
				if (!name) continue;
				files.push({
					name: name,
					path: '/uploads/' + name
				});
			}
			console.log(files);
			render(files);
		})
		.catch(err => console.error(err));
}

function render(files) {
	var wrap = document.getElementById('file-wrap');
	if (!files.length) {
		wrap.innerHTML =
			'<div class="empty-state">' +
			'<span class="empty-icon">📭</span>' +
			'No files yet.' +
			'</div>';
		return;
	}
	var rows = '';
	for (var i = 0; i < files.length; i++) {
		var f = files[i];
		rows +=
			'<tr>' +
			'<td class="file-name"><a href="' + f.path + '" target="_blank">' + f.name + '</a></td>' +
			'<td style="text-align:right;">' +
			'<button class="del-btn" data-path="' + f.path + '" onclick="del(this)">✕ delete</button>' +
			'</td>' +
			'</tr>';
	}
	wrap.innerHTML =
		'<table class="file-table">' +
		'<thead><tr>' +
		'<th>Name</th>' +
		'<th style="text-align:right;">Action</th>' +
		'</tr></thead>' +
		'<tbody>' + rows + '</tbody>' +
		'</table>';
}

function del(btn) {
	var path = btn.getAttribute('data-path');
	btn.disabled = true;
	btn.textContent = '…';

	fetch(path, { method: 'DELETE' })
		.then(function(res) {
			if (res.ok) {
				var tr = btn.parentNode.parentNode;
				tr.style.transition = 'opacity 0.18s';
				tr.style.opacity = '0';
				setTimeout(function() {
					tr.remove();
					var tbody = document.querySelector('.file-table tbody');
					if (tbody && !tbody.querySelector('tr'))
						render([]);
				}, 180);
			} else {
				btn.disabled = false;
				btn.textContent = '✕ delete';
				res.text().then(function(body) {
					document.open();
					document.write(body);
					document.close();
				});
			}
		})
		.catch(function(err) {
			console.error('[del] error:', err);
			btn.disabled = false;
			btn.textContent = '✕ delete';
		});
}

loadFiles();
</script>
</body>
</html>
