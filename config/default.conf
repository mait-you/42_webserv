server {
    listen localhost:8080;
    server_name localhost;

    root ./www/site1;
    index index.html;

    client_max_body_size 1000000;

    location / {
        allow_methods  GET POST;
        autoindex off;
		upload_path upload/;
    }
    location /css {
        allow_methods GET;
        autoindex on;
    }

        location /images {
        allow_methods GET DELETE;
        autoindex on;
    }
}
