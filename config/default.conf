# ============================================================
# webserv — sample production-style configuration
# ============================================================

server {
    listen 8080;
    server_name  filemanager.local;
    root         www;
    index        index.html;
    client_max_body_size 10MB;

    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    # ---- Static site root ----
    location / {
        allow_methods GET POST;
        autoindex off;
        index index.html;
    }

    # ---- Static assets ----
    location /assets {
        allow_methods GET;
        autoindex off;
    }

    # ---- File-manager dashboard ----
    location /dashboard {
        allow_methods GET;
        index file-manager.html;
    }

    # ---- Auth / session pages ----
    location /auth {
        allow_methods GET POST;
        index login.html;
    }

    # ---- Uploads: GET to list/download, POST to upload, DELETE to remove ----
    location /uploads {
        allow_methods GET POST DELETE;
        autoindex on;
        # upload_path /mnt/c/Users/user/Desktop/uploads;
        # upload_path /home/mait-you/goinfre/uploads;
        upload_path www/uploads;
        client_max_body_size 10MB;
    }

    # ---- CGI bin: multiple interpreters ----
    location /cgi-bin {
        allow_methods GET POST DELETE;
        cgi_pass .py  /usr/bin/python3;
        cgi_pass .php /usr/bin/php-cgi;
        cgi_pass .sh  /bin/bash;
    }

    # ---- Redirect example ----
    location /old {
        return 301 /dashboard/file-manager.html;
    }

    # ---- Custom error pages folder ----
    location /errors {
        allow_methods GET;
    }
}

# ============================================================
# Second virtual server on a different port (different content)
# ============================================================
server {
    listen 8081;
    server_name  api.local;
    root         www;
    client_max_body_size 2097152;

    error_page 404 /errors/404.html;

    location / {
        allow_methods GET;
        autoindex on;
    }

    location /api {
        allow_methods GET POST;
        cgi_pass .py /usr/bin/python3;
    }
}
