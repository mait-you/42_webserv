# SERVER BLOCK 1 - Site1 on port 8080
# Serves the main website with full features
server {
	# [REQUIRED] Listen on all interfaces, port 8080
	listen localhost:8080;

	# [OPTIONAL] Maximum allowed size for client request body
	# Default: unlimited
	# If exceeded -> 413 Payload Too Large
	client_max_body_size 1048576;

	# [REQUIRED] Global filesystem root for all locations
	# Each location inherits this unless it overrides with its own root
	root ./www/site1;

	# [OPTIONAL] Custom error pages
	# Default: built-in default error page
	# error_page 400 /error_pages/400.html;
	# error_page 403 /error_pages/403.html;
	error_page 404 /error_pages/404.html;
	# error_page 405 /error_pages/405.html;
	# error_page 413 /error_pages/413.html;
	# error_page 500 /error_pages/500.html;
	# error_page 505 /error_pages/505.html;

	# ROOT LOCATION - Serves static website (index.html, css, js, images)
	# URL: /  ->  filesystem: ./www/site1/
	location / {
		# [OPTIONAL] Default file to serve when request is a directory
		# Default: none (autoindex or 403)
		index index.html;

		# [OPTIONAL] Allowed HTTP methods for this location
		# Default: GET
		allow_methods GET;

		# [OPTIONAL] Directory listing
		# Default: off
		autoindex off;
	}

	# ABOUT PAGE
	# URL: /about.html  ->  filesystem: ./www/site1/about.html
	location /about.html {
		allow_methods GET;
		autoindex off;
	}

	# CSS - Static CSS files
	# URL: /css/  ->  filesystem: ./www/site1/css/
	location /css {
		allow_methods GET;
		autoindex off;
	}

	# JS - Static JavaScript files
	# URL: /js/  ->  filesystem: ./www/site1/js/
	location /js {
		allow_methods GET;
		autoindex   off;
	}

	# IMAGES - Static image files, directory listing enabled
	# URL: /images/  ->  filesystem: ./www/site1/images/
	location /images {
		allow_methods GET;
		autoindex on;
	}

	# UPLOADS - File upload endpoint
	# URL: /uploads/  ->  filesystem: ./www/site1/uploads/
	location /uploads {
		allow_methods GET POST DELETE;
		autoindex on;

		# [OPTIONAL] Directory where uploaded files are saved
		# Default: none (upload disabled)
		upload_path ./www/site1/uploads/;
	}

	# SUBMIT - CGI endpoint for form submissions
	# URL: /uploads/submit  ->  filesystem: ./www/site1/uploads/submit
	# fork() + execve() with env vars: REQUEST_METHOD, CONTENT_LENGTH, etc.
	location /uploads/submit {
		# root ./www/site1/uploads;
		allow_methods   GET POST;

		# [OPTIONAL] CGI program to execute for matched file extension
		# Default: none (CGI disabled)
		# cgi_ext .py /usr/bin/python3;
	}

	# ERROR PAGES - Serve custom error HTML files
	# URL: /error_pages/  ->  filesystem: ./www/error_pages/
	location /error_pages {
		# root ./www;
		allow_methods GET;
		autoindex off;
	}
	location /cgi-bin {
		allow_methods GET POST;
		root ./www/site1;
		cgi_extension .py;
		cgi_path /usr/bin/python3;
	}
}

