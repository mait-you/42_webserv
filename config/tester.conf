server {
    listen localhost:8080;
    server_name tester;
    client_max_body_size 200000000;
    root ./www;

location / {
        allow_methods GET;
        cgi_pass .bla ./cgi_tester;
    }

    location /post_body {
        allow_methods POST;
    }

    location /directory {
        allow_methods GET POST;
        root ./YoupiBanane/;
        index youpi.bad_extension;
        cgi_pass .bla ./cgi_tester;
    }
}